<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORCS 比赛解说中间件</title>
<style>
  /* ─── 整体 ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #1a1b23;
    --surface:   #22232e;
    --surface2:  #2b2d3a;
    --border:    #3a3c4e;
    --accent:    #7c6af7;
    --accent2:   #56cfb2;
    --danger:    #e05c6e;
    --text:      #d4d6e8;
    --text-dim:  #7a7e9a;
    --user-bg:   #1e2a3a;
    --ai-bg:     #1f2630;
    --radius:    8px;
    --sidebar:   320px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
  }

  /* ─── 左侧面板 (SillyTavern 风格配置区) ────────────── */
  #sidebar {
    width: var(--sidebar);
    min-width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-header svg { flex-shrink: 0; }

  .section {
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .section-title::after {
    content: '▾';
    margin-left: auto;
    transition: transform .2s;
  }
  .section-title.collapsed::after { transform: rotate(-90deg); }

  .section-body { display: flex; flex-direction: column; gap: 8px; }
  .section-body.collapsed { display: none; }

  label { font-size: 12px; color: var(--text-dim); margin-bottom: 2px; display: block; }

  input[type=text], input[type=password], input[type=number],
  select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  .row { display: flex; gap: 6px; }
  .row > * { flex: 1; }

  /* 范围滑块 */
  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  .slider-wrap input[type=range] { flex: 1; accent-color: var(--accent); }
  .slider-val { font-size: 12px; color: var(--accent); min-width: 40px; text-align: right; }

  /* 按钮 */
  button {
    padding: 7px 14px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger   { background: var(--danger); color: #fff; }
  .btn-sm       { padding: 4px 10px; font-size: 12px; }
  button:disabled { opacity: .4; cursor: default; }

  /* 状态徽章 */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 99px; font-size: 11px;
  }
  .badge-ok    { background: #1d3a2a; color: #56cfb2; }
  .badge-warn  { background: #3a2a1a; color: #f0a060; }
  .badge-error { background: #3a1a1a; color: #e05c6e; }

  /* ─── 主内容区 ──────────────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 顶栏 */
  #topbar {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; flex: 1; }

  /* 遥测状态条 */
  #telemetry-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .tele-item strong { color: var(--accent2); }

  /* 上下文预算条（对应 ST 的 Token Counter）*/
  #token-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 5px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    flex-shrink: 0;
  }
  #token-progress {
    flex: 1; height: 5px; border-radius: 99px;
    background: var(--surface2); overflow: hidden;
  }
  #token-fill {
    height: 100%; border-radius: 99px;
    background: var(--accent);
    transition: width .3s;
  }
  #token-label { color: var(--text-dim); }

  /* 对话区 */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg { display: flex; flex-direction: column; max-width: 90%; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai   { align-self: flex-start; align-items: flex-start; }

  .msg-label {
    font-size: 11px;
    color: var(--text-dim);
    padding: 0 4px;
  }

  .msg-bubble {
    border-radius: var(--radius);
    padding: 10px 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid #2a4060;
    color: #a0c4ff;
    font-family: 'Cascadia Code', 'Consolas', monospace;
    font-size: 12px;
  }
  .msg.ai .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid #2a3040;
    color: var(--text);
    font-size: 14px;
  }
  .msg.ai .msg-bubble.streaming::after {
    content: '▋';
    animation: blink .7s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* 底部输入栏 */
  #bottom-bar {
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
    background: var(--surface);
  }
  #manual-input {
    flex: 1;
    min-height: 44px;
    max-height: 120px;
    resize: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 10px 14px;
    font-size: 13px;
  }

  /* 系统消息 */
  .sys-msg {
    align-self: center;
    font-size: 11px;
    color: var(--text-dim);
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--surface2);
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* 连接指示灯 */
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
    background: var(--danger);
    flex-shrink: 0;
  }
  .dot.connected { background: var(--accent2); }

  /* 折叠 tag */
  details > summary { cursor: pointer; }

  /* 字段多选 */
  .field-grid {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .field-chip {
    padding: 2px 8px; border-radius: 99px; font-size: 11px; cursor: pointer;
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
    user-select: none; transition: all .15s;
  }
  .field-chip.active {
    background: #2d2060; border-color: var(--accent); color: var(--accent);
  }

  /* 自动解说指示 */
  #auto-indicator {
    font-size: 11px; color: var(--text-dim);
    padding: 2px 8px; border-radius: 99px;
  }
  #auto-indicator.active { background: #1d3a2a; color: var(--accent2); }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════ 左侧面板 ══ -->
<div id="sidebar">
  <div class="sidebar-header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
    </svg>
    TORCS 解说中间件
  </div>

  <!-- ── AI API 配置 ── -->
  <div class="section">
    <div class="section-title" onclick="toggleSection(this)">AI API 配置</div>
    <div class="section-body">
      <div>
        <label>提供商</label>
        <select id="api-provider" onchange="onProviderChange()">
          <option value="openai">OpenAI / 兼容接口</option>
          <option value="anthropic">Anthropic Claude</option>
          <option value="ollama">Ollama (本地)</option>
        </select>
      </div>
      <div>
        <label>Base URL</label>
        <input type="text" id="api-base-url" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1">
      </div>
      <div>
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-...">
      </div>
      <div>
        <label>模型</label>
        <input type="text" id="api-model" value="gpt-4o-mini" placeholder="gpt-4o-mini">
      </div>
      <div>
        <label>Temperature: <span id="temp-val">0.8</span></label>
        <div class="slider-wrap">
          <input type="range" min="0" max="2" step="0.05" value="0.8"
            oninput="document.getElementById('temp-val').textContent=this.value">
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="api-stream" checked>
        <label for="api-stream" style="margin:0;cursor:pointer">流式输出 (streaming)</label>
      </div>
      <button class="btn-primary" onclick="saveApiConfig()">保存 API 配置</button>
    </div>
  </div>

  <!-- ── 上下文控制 (SillyTavern 核心) ── -->
  <div class="section">
    <div class="section-title" onclick="toggleSection(this)">上下文控制</div>
    <div class="section-body">
      <div>
        <label>上下文窗口 (tokens): <span id="ctx-tokens-val">4096</span></label>
        <div class="slider-wrap">
          <input type="range" min="512" max="32768" step="256" value="4096" id="ctx-tokens"
            oninput="document.getElementById('ctx-tokens-val').textContent=this.value">
        </div>
      </div>
      <div>
        <label>回复预留 (tokens): <span id="resp-tokens-val">512</span></label>
        <div class="slider-wrap">
          <input type="range" min="128" max="4096" step="64" value="512" id="resp-tokens"
            oninput="document.getElementById('resp-tokens-val').textContent=this.value">
        </div>
      </div>
      <div>
        <label>裁剪策略</label>
        <select id="trim-strategy">
          <option value="oldest_first">裁剪最旧消息 (推荐)</option>
          <option value="newest_first">裁剪最新消息</option>
        </select>
      </div>
      <div>
        <label>聊天模板</label>
        <select id="chat-template">
          <option value="chatml">ChatML</option>
          <option value="instruct">Instruct</option>
          <option value="raw">Raw</option>
        </select>
      </div>
      <div>
        <label>解说员人设 (System Prompt)</label>
        <textarea id="commentator-persona" rows="5">你是一位专业的赛车比赛解说员，风格热情、专业、带有临场感。根据提供的实时遥测数据，用流畅的中文给出简短（2-4句）的精彩解说。重点关注：速度变化、位次争夺、驾驶动作、危险情况。</textarea>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="include-rankings" checked>
        <label for="include-rankings" style="margin:0;cursor:pointer">附加排名信息</label>
      </div>
      <button class="btn-primary" onclick="saveContextConfig()">保存上下文配置</button>
      <button class="btn-secondary btn-sm" onclick="clearHistory()">清除对话历史</button>
    </div>
  </div>

  <!-- ── 遥测字段选择 ── -->
  <div class="section">
    <div class="section-title" onclick="toggleSection(this)">遥测字段过滤</div>
    <div class="section-body">
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:6px;">
        点击选择/取消要发给 AI 的字段
      </div>
      <div class="field-grid" id="field-grid"></div>
      <button class="btn-secondary btn-sm" style="margin-top:6px" onclick="saveContextConfig()">应用字段设置</button>
    </div>
  </div>

  <!-- ── 数据源 ── -->
  <div class="section">
    <div class="section-title" onclick="toggleSection(this)">数据源</div>
    <div class="section-body">
      <div>
        <label>📡 UDP 监听</label>
        <span class="badge badge-ok">自动监听 :3101</span>
      </div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div>
        <label>📂 加载 CSV 文件</label>
        <input type="text" id="csv-path" placeholder="/path/to/player-1-*.csv">
      </div>
      <div>
        <label>排名 CSV (可选)</label>
        <input type="text" id="csv-rank-path" placeholder="/path/to/rankings-player-1-*.csv">
      </div>
      <button class="btn-secondary" onclick="loadCsv()">读取 CSV 并解说</button>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div>
        <label>🔧 手动注入测试数据</label>
        <button class="btn-secondary btn-sm" onclick="injectDemo()">注入演示数据</button>
      </div>
    </div>
  </div>

  <!-- ── 自动解说 ── -->
  <div class="section">
    <div class="section-title" onclick="toggleSection(this)">自动解说</div>
    <div class="section-body">
      <div>
        <label>模式</label>
        <select id="commentary-mode">
          <option value="off">关闭</option>
          <option value="interval">固定间隔</option>
          <option value="event">事件驱动</option>
          <option value="hybrid">事件 + 间隔</option>
        </select>
      </div>
      <div>
        <label>解说间隔 (秒，0=关闭): <span id="auto-interval-val">0</span></label>
        <div class="slider-wrap">
          <input type="range" min="0" max="60" step="1" value="0" id="auto-interval"
            oninput="document.getElementById('auto-interval-val').textContent=this.value">
        </div>
      </div>
      <div class="row">
        <div>
          <label>事件窗口 (秒)</label>
          <input type="number" min="2" max="30" step="1" id="event-window" value="6">
        </div>
        <div>
          <label>事件冷却 (秒)</label>
          <input type="number" min="0" max="10" step="0.5" id="event-cooldown" value="1">
        </div>
      </div>
      <button class="btn-primary" onclick="saveAutoInterval()">应用</button>
      <div id="auto-indicator">自动解说：未启动</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════ 主内容区 ══ -->
<div id="main">
  <!-- 顶栏 -->
  <div id="topbar">
    <h1>🏎️ 比赛解说</h1>
    <span class="dot" id="ws-dot" title="WebSocket 连接状态"></span>
    <span id="ws-label" style="font-size:12px;color:var(--text-dim)">未连接</span>
  </div>

  <!-- 遥测状态条 -->
  <div id="telemetry-bar">
    <span>等待遥测数据…</span>
  </div>

  <!-- Token 预算条 -->
  <div id="token-bar">
    <span style="font-size:11px;color:var(--text-dim)">上下文</span>
    <div id="token-progress"><div id="token-fill" style="width:0%"></div></div>
    <span id="token-label">0 / 4096 tokens</span>
  </div>

  <!-- 对话区 -->
  <div id="chat">
    <div class="sys-msg">连接后将在此显示比赛解说</div>
  </div>

  <!-- 底部输入栏 -->
  <div id="bottom-bar">
    <textarea id="manual-input" placeholder="手动输入问题或情境（留空则使用最新遥测数据）…"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendManual()}"></textarea>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn-primary" id="send-btn" onclick="sendManual()">▶ 解说</button>
      <button class="btn-secondary btn-sm" onclick="clearHistory()">清除</button>
    </div>
  </div>
</div>

<script>
// ─── 状态 ──────────────────────────────────────────────────────────────
let ws = null;
let streamingBubble = null;
let streamingText = '';
let currentStats = { max_context_tokens: 4096, history_tokens: 0, system_tokens: 0 };

const ALL_FIELDS = [
  "sim_time","racePos","lap","speedX","rpm","gear",
  "throttle","brake","steer","damage","fuel",
  "lastLapTime","curLapTime","trackPos","distFromStart",
  "x","y","yaw","angle","speedY","speedZ","distRaced",
];
let activeFields = new Set([
  "sim_time","racePos","lap","speedX","rpm","gear",
  "throttle","brake","steer","damage","fuel",
  "lastLapTime","curLapTime","trackPos","distFromStart",
]);

// ─── 初始化 ────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildFieldGrid();
  connectWS();
  loadConfig();
});

// ─── 侧栏折叠 ──────────────────────────────────────────────────────────
function toggleSection(el) {
  el.classList.toggle('collapsed');
  el.nextElementSibling.classList.toggle('collapsed');
}

// ─── WebSocket ─────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setWsStatus(true);
    ping();
  };
  ws.onclose = () => {
    setWsStatus(false);
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => setWsStatus(false);

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    handleWsMessage(msg);
  };
}

function setWsStatus(ok) {
  document.getElementById('ws-dot').className = 'dot' + (ok ? ' connected' : '');
  document.getElementById('ws-label').textContent = ok ? '已连接' : '重连中…';
}

function ping() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send('ping');
    setTimeout(ping, 15000);
  }
}

// ─── WS 消息处理 ───────────────────────────────────────────────────────
function handleWsMessage(msg) {
  switch (msg.type) {
    case 'connected':
      updateStats(msg.stats);
      sysMsg('WebSocket 已连接');
      break;

    case 'pong': break;

    case 'telemetry_update':
      updateTelemetryBar(msg.telemetry);
      break;

    case 'event_detected':
      sysMsg(`事件：${msg.event.event_type} — ${msg.event.reason}`);
      break;

    case 'user_msg':
      appendMsg('user', msg.content);
      updateStats(msg.stats);
      break;

    case 'ai_start':
      streamingText = '';
      streamingBubble = appendMsg('ai', '', true);
      break;

    case 'token':
      if (streamingBubble) {
        streamingText += msg.text;
        streamingBubble.textContent = streamingText;
      }
      break;

    case 'ai_done':
      if (streamingBubble) {
        streamingBubble.classList.remove('streaming');
        streamingBubble = null;
      }
      updateStats(msg.stats);
      break;

    case 'error':
      sysMsg('❌ ' + msg.message, true);
      if (streamingBubble) {
        streamingBubble.classList.remove('streaming');
        streamingBubble = null;
      }
      break;
  }
}

// ─── 聊天 UI ───────────────────────────────────────────────────────────
function appendMsg(role, content, streaming = false) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? '📊 遥测数据' : '🎙️ 解说员';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble' + (streaming ? ' streaming' : '');
  bubble.textContent = content;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return bubble;
}

function sysMsg(text, isError = false) {
  const chat = document.getElementById('chat');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.style.color = isError ? 'var(--danger)' : '';
  el.textContent = text;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
}

// ─── Token 预算条 ──────────────────────────────────────────────────────
function updateStats(stats) {
  if (!stats) return;
  currentStats = stats;
  const used = stats.system_tokens + stats.history_tokens;
  const max  = stats.max_context_tokens;
  const pct  = Math.min(100, (used / max) * 100);
  document.getElementById('token-fill').style.width = pct + '%';
  document.getElementById('token-fill').style.background =
    pct > 80 ? 'var(--danger)' : pct > 60 ? '#f0a060' : 'var(--accent)';
  document.getElementById('token-label').textContent =
    `${used.toLocaleString()} / ${max.toLocaleString()} tokens`;
}

// ─── 遥测状态条 ────────────────────────────────────────────────────────
function updateTelemetryBar(t) {
  if (!t) return;
  const bar = document.getElementById('telemetry-bar');
  const items = [
    ['P', t.racePos],
    ['圈', t.lap],
    ['速度', t.speedX != null ? t.speedX.toFixed(1) + ' km/h' : '--'],
    ['油门', t.throttle != null ? (t.throttle * 100).toFixed(0) + '%' : '--'],
    ['制动', t.brake    != null ? (t.brake    * 100).toFixed(0) + '%' : '--'],
    ['挡位', t.gear],
    ['RPM', t.rpm != null ? Math.round(t.rpm) : '--'],
    ['损伤', t.damage != null ? t.damage.toFixed(0) : '--'],
    ['T', t.sim_time != null ? t.sim_time.toFixed(1) + 's' : '--'],
  ];
  bar.innerHTML = items.map(([k, v]) =>
    `<span>${k}: <strong>${v ?? '--'}</strong></span>`
  ).join('');
}

// ─── 手动发送 ──────────────────────────────────────────────────────────
async function sendManual() {
  const prompt = document.getElementById('manual-input').value.trim();
  document.getElementById('manual-input').value = '';
  document.getElementById('send-btn').disabled = true;

  try {
    await fetch('/api/commentary/manual', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt: prompt || null }),
    });
  } catch(e) { sysMsg('请求失败: ' + e.message, true); }

  setTimeout(() => document.getElementById('send-btn').disabled = false, 500);
}

async function clearHistory() {
  await fetch('/api/commentary/clear', { method: 'POST' });
  document.getElementById('chat').innerHTML = '';
  sysMsg('对话历史已清除');
  const r = await fetch('/api/stats');
  updateStats(await r.json());
}

// ─── 配置保存 ──────────────────────────────────────────────────────────
async function saveApiConfig() {
  const rangeEl = document.querySelector('#sidebar input[type=range]');
  const body = {
    provider:    document.getElementById('api-provider').value,
    base_url:    document.getElementById('api-base-url').value,
    api_key:     document.getElementById('api-key').value,
    model:       document.getElementById('api-model').value,
    temperature: parseFloat(rangeEl.value),
    stream:      document.getElementById('api-stream').checked,
  };
  const r = await fetch('/api/config/api', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  sysMsg(r.ok ? '✅ API 配置已保存' : '❌ 保存失败');
}

async function saveContextConfig() {
  const body = {
    max_context_tokens:  parseInt(document.getElementById('ctx-tokens').value),
    max_response_tokens: parseInt(document.getElementById('resp-tokens').value),
    trim_strategy:       document.getElementById('trim-strategy').value,
    chat_template:       document.getElementById('chat-template').value,
    commentator_persona: document.getElementById('commentator-persona').value,
    include_rankings:    document.getElementById('include-rankings').checked,
    included_fields:     Array.from(activeFields),
  };
  const r = await fetch('/api/config/context', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body),
  });
  const data = await r.json();
  sysMsg(r.ok ? '✅ 上下文配置已保存' : '❌ 保存失败');
  if (data.stats) updateStats(data.stats);
}

async function saveAutoInterval() {
  const v = parseInt(document.getElementById('auto-interval').value);
  const mode = document.getElementById('commentary-mode').value;
  await fetch('/api/commentary/config', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      mode: v <= 0 ? 'off' : mode,
      baseline_interval: v,
      window_seconds: parseFloat(document.getElementById('event-window').value),
      event_cooldown: parseFloat(document.getElementById('event-cooldown').value),
    }),
  });
  const ind = document.getElementById('auto-indicator');
  if (v > 0 && mode !== 'off') {
    ind.textContent = `自动解说：${mode} / ${v} 秒`;
    ind.classList.add('active');
  } else {
    ind.textContent = '自动解说：未启动';
    ind.classList.remove('active');
  }
}

async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const cfg = await r.json();
    const api = cfg.api;
    const ctx = cfg.context;

    document.getElementById('api-provider').value = api.provider;
    document.getElementById('api-base-url').value = api.base_url;
    document.getElementById('api-model').value    = api.model;
    document.getElementById('api-stream').checked = api.stream;
    // temperature
    const tempRange = document.querySelector('#sidebar input[type=range]');
    tempRange.value = api.temperature;
    document.getElementById('temp-val').textContent = api.temperature;

    document.getElementById('ctx-tokens').value  = ctx.max_context_tokens;
    document.getElementById('ctx-tokens-val').textContent = ctx.max_context_tokens;
    document.getElementById('resp-tokens').value = ctx.max_response_tokens;
    document.getElementById('resp-tokens-val').textContent = ctx.max_response_tokens;
    document.getElementById('trim-strategy').value       = ctx.trim_strategy;
    document.getElementById('chat-template').value       = ctx.chat_template;
    document.getElementById('commentator-persona').value = ctx.commentator_persona;
    document.getElementById('include-rankings').checked  = ctx.include_rankings;
    activeFields = new Set(ctx.included_fields);
    renderFieldChips();

    document.getElementById('auto-interval').value = cfg.auto_interval;
    document.getElementById('auto-interval-val').textContent = cfg.auto_interval;
    if (cfg.commentary) {
      document.getElementById('commentary-mode').value = cfg.commentary.mode;
      document.getElementById('event-window').value = cfg.commentary.window_seconds;
      document.getElementById('event-cooldown').value = cfg.commentary.event_cooldown;
    }
    if (cfg.auto_interval > 0 && (!cfg.commentary || cfg.commentary.mode !== 'off')) {
      document.getElementById('auto-indicator').textContent = `自动解说：${cfg.commentary?.mode || 'interval'} / ${cfg.auto_interval} 秒`;
      document.getElementById('auto-indicator').classList.add('active');
    }
  } catch(e) { console.warn('loadConfig 失败', e); }
}

function onProviderChange() {
  const p = document.getElementById('api-provider').value;
  const urlEl = document.getElementById('api-base-url');
  const modelEl = document.getElementById('api-model');
  if (p === 'openai')     { urlEl.value = 'https://api.openai.com/v1'; modelEl.value = 'gpt-4o-mini'; }
  if (p === 'anthropic')  { urlEl.value = 'https://api.anthropic.com'; modelEl.value = 'claude-3-haiku-20240307'; }
  if (p === 'ollama')     { urlEl.value = 'http://localhost:11434/v1'; modelEl.value = 'qwen2.5:7b'; }
}

// ─── CSV 加载 ──────────────────────────────────────────────────────────
async function loadCsv() {
  const path = document.getElementById('csv-path').value.trim();
  const rpath = document.getElementById('csv-rank-path').value.trim();
  if (!path) { sysMsg('请输入 CSV 路径', true); return; }
  const r = await fetch('/api/csv/load', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ path, rankings_path: rpath || null }),
  });
  const data = await r.json();
  if (data.error) sysMsg('❌ ' + data.error, true);
  else sysMsg(`✅ 已加载 ${data.rows_loaded} 行，sim_time=${data.latest_sim_time?.toFixed(1)}s`);
}

// ─── 字段多选 ──────────────────────────────────────────────────────────
function buildFieldGrid() {
  const grid = document.getElementById('field-grid');
  ALL_FIELDS.forEach(f => {
    const chip = document.createElement('span');
    chip.className = 'field-chip' + (activeFields.has(f) ? ' active' : '');
    chip.textContent = f;
    chip.onclick = () => {
      if (activeFields.has(f)) { activeFields.delete(f); chip.classList.remove('active'); }
      else { activeFields.add(f); chip.classList.add('active'); }
    };
    grid.appendChild(chip);
  });
}

function renderFieldChips() {
  document.querySelectorAll('.field-chip').forEach(chip => {
    if (activeFields.has(chip.textContent)) chip.classList.add('active');
    else chip.classList.remove('active');
  });
}
